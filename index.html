    <script>
      // Restore path from GitHub Pages 404 redirect
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var search = location.search;
        if (search.indexOf('?p=/') !== -1 || search.indexOf('&p=/') !== -1) {
          var params = search.slice(1).split('&');
          var path = '', query = '';
          params.forEach(function(p) {
            if (p.slice(0, 2) === 'p=') path = p.slice(2).replace(/~and~/g, '&');
            else if (p.slice(0, 2) === 'q=') query = '?' + p.slice(2).replace(/~and~/g, '&');
          });
          history.replaceState(null, null, '/Trade-Journal/' + path + query + location.hash);
        }
      })();
    </script>
